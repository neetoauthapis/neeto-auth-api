# Server configuration used across all endpoints
servers:
  - description: NeetoAuth APIs
    url: https://{your-subdomain}.neetoauth.com/api/external/v2
    variables:
      your-subdomain:
        default: spinkart
        description: Replace **spinkart** with your [workspace's subdomain](/getting-started/workspace-subdomain).

# Common API Key header parameter
api_key_header:
  in: header
  name: X-Api-Key
  description: Use the X-Api-Key header to provide your workspace API key. Refer to [Authentication](/getting-started/authentication) for more information.
  required: true
  schema:
    type: string

# Common pagination parameters
page_number_param:
  in: query
  name: page_number
  description: Retrieve paginated results by specifying the desired page number. Defaulting to 1 when omitted.
  required: false
  schema:
    type: integer

page_size_param:
  in: query
  name: page_size
  description: Set the number of results returned in the response. Defaulting to 30 when omitted.
  required: false
  schema:
    type: integer

# Common date-time field schema
date_time_field:
  type: string
  format: date-time

components:
  schemas:
    Pagination:
      type: object
      properties:
        total_records:
          type: integer
        total_pages:
          type: integer
        current_page_number:
          type: integer
        page_size:
          type: integer

    PaginatedResponse:
      type: object
      properties:
        pagination:
          $ref: "#/components/schemas/Pagination"
        total_count:
          type: integer
